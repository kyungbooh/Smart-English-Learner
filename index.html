<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Syntax Master | Tree Diagram Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #1e293b; overflow-x: hidden; }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid #e2e8f0; }
        .card-shadow { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
        .chunk-slash { color: #6366f1; font-weight: 300; margin: 0 0.5rem; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide { animation: slideUp 0.5s ease-out forwards; }
        
        /* Tree Diagram Styles */
        .tree-node { font-size: 14px; font-weight: 700; fill: #475569; }
        .tree-leaf { font-size: 16px; font-weight: 800; fill: #6366f1; }
        .tree-line { stroke: #cbd5e1; stroke-width: 2; fill: none; }
        .tree-container { overflow-x: auto; cursor: grab; }
        .tree-container:active { cursor: grabbing; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                brain: <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .52 5.588 4 4 0 0 0 7.837.231S12 16 12 15Zm0 0a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.52 5.588 4 4 0 0 1-7.837.231S12 16 12 15Z"/>,
                sparkle: <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>,
                tree: <path d="M12 2L8 6h3v8H4l8 8 8-8h-7V6h3l-4-4z"/>,
                plus: <path d="M5 12h14m-7-7v14"/>,
                x: <path d="M18 6 6 18M6 6l12 12"/>,
                left: <path d="m15 18-6-6 6-6"/>,
                right: <path d="m9 18 6-6 6-6"/>,
                lock: <><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>,
                unlock: <><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const TreeDiagram = ({ data }) => {
            if (!data) return <div className="text-slate-400 py-10">수형도 데이터를 분석할 수 없습니다.</div>;

            const nodeWidth = 85;
            const nodeHeight = 70;
            const padding = 50;

            const calculatePositions = (node, depth = 0, xOffset = 0) => {
                let totalWidth = 0;
                if (node.children && node.children.length > 0) {
                    node.children.forEach(child => {
                        const childPos = calculatePositions(child, depth + 1, xOffset + totalWidth);
                        totalWidth += childPos.subtreeWidth;
                    });
                } else {
                    totalWidth = nodeWidth;
                }

                node.x = xOffset + totalWidth / 2;
                node.y = depth * nodeHeight + padding;
                node.subtreeWidth = totalWidth;
                return node;
            };

            const rootWithPos = calculatePositions(JSON.parse(JSON.stringify(data)));
            
            const renderLinks = (node) => {
                if (!node.children) return null;
                return node.children.map((child, i) => (
                    <React.Fragment key={i}>
                        <line className="tree-line" x1={node.x} y1={node.y} x2={child.x} y2={child.y} />
                        {renderLinks(child)}
                    </React.Fragment>
                ));
            };

            const renderNodes = (node) => (
                <React.Fragment key={`${node.name}-${node.x}-${node.y}`}>
                    <text x={node.x} y={node.y} textAnchor="middle" className={node.children ? "tree-node" : "tree-leaf"}>
                        {node.name}
                    </text>
                    {node.children && node.children.map(child => renderNodes(child))}
                </React.Fragment>
            );

            const width = Math.max(800, rootWithPos.subtreeWidth + padding * 2);
            const height = 450;

            return (
                <div className="tree-container bg-white rounded-2xl p-6 overflow-auto border border-slate-200 shadow-inner">
                    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`}>
                        {renderLinks(rootWithPos)}
                        {renderNodes(rootWithPos)}
                    </svg>
                </div>
            );
        };

        const App = () => {
            // apiKey를 빈 문자열로 두면 런타임에서 주입됩니다.
            const apiKey = ""; 
            const adminPassword = "56425280oh";

            const [sentences, setSentences] = useState([
                { 
                    id: 1, 
                    english: "There is no age / at which it is too late / to form this habit.", 
                    korean: "이 습관을 형성하기에 너무 늦은 나이란 없습니다.", 
                    grammar: "at which: 전치사 + 관계대명사 구조",
                    treeData: {
                        name: "S",
                        children: [
                            { name: "NP", children: [{ name: "There" }] },
                            { name: "VP", children: [
                                { name: "V", children: [{ name: "is" }] },
                                { name: "NP", children: [
                                    { name: "Det", children: [{ name: "no" }] },
                                    { name: "N", children: [{ name: "age" }] },
                                    { name: "CP", children: [
                                        { name: "Spec", children: [{ name: "at which" }] },
                                        { name: "S", children: [{ name: "..." }] }
                                    ] }
                                ]}
                            ]}
                        ]
                    }
                }
            ]);

            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);
            const [showTree, setShowTree] = useState(false);
            const [mode, setMode] = useState('card');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [inputText, setInputText] = useState("");
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [isAdmin, setIsAdmin] = useState(false);
            const [isLoginModalOpen, setIsLoginModalOpen] = useState(false);
            const [pwInput, setPwInput] = useState("");

            const handleLogin = () => {
                if(pwInput === adminPassword) {
                    setIsAdmin(true);
                    setIsLoginModalOpen(false);
                    setPwInput("");
                } else {
                    alert("비밀번호가 일치하지 않습니다.");
                }
            };

            const runAnalysis = async () => {
                if (!inputText.trim()) return;
                setIsAnalyzing(true);

                const systemPrompt = "You are a world-class linguist expert in Chomskyan Generative Grammar. Your task is to analyze English sentences into hierarchical syntax trees and grammar notes for Korean high school students. Always respond in valid JSON format.";
                const userQuery = `Analyze the following English text: "${inputText}".
                For each sentence, provide:
                1. "english": Original sentence with chunks divided by ' / '.
                2. "korean": Natural Korean translation.
                3. "grammar": One key grammatical insight (short string).
                4. "treeData": A hierarchical object structure for a syntax tree (max depth 6).
                Example: {"name": "S", "children": [{"name": "NP", "children": [{"name": "He"}]}, {"name": "VP", "children": [{"name": "V", "children": [{"name": "runs"}]}]}]}
                
                Return an ARRAY of these objects. Ensure valid JSON.`;

                let retries = 0;
                const maxRetries = 5;

                const fetchWithRetry = async (delay) => {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: userQuery }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] },
                                generationConfig: { 
                                    responseMimeType: "application/json",
                                    responseSchema: {
                                        type: "ARRAY",
                                        items: {
                                            type: "OBJECT",
                                            properties: {
                                                english: { type: "STRING" },
                                                korean: { type: "STRING" },
                                                grammar: { type: "STRING" },
                                                treeData: { type: "OBJECT" }
                                            },
                                            required: ["english", "korean", "grammar", "treeData"]
                                        }
                                    }
                                }
                            })
                        });

                        if (!response.ok) throw new Error("API Request Failed");
                        
                        const result = await response.json();
                        const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                        if (!text) throw new Error("Empty response from AI");
                        
                        const data = JSON.parse(text);
                        const newItems = data.map(item => ({ ...item, id: Date.now() + Math.random() }));
                        
                        setSentences(newItems);
                        setCurrentIndex(0);
                        setIsModalOpen(false);
                        setInputText("");
                        setIsAnalyzing(false);
                    } catch (e) {
                        if (retries < maxRetries) {
                            retries++;
                            setTimeout(() => fetchWithRetry(delay * 2), delay);
                        } else {
                            console.error(e);
                            setIsAnalyzing(false);
                            alert("AI 분석 엔진에 연결할 수 없습니다. 잠시 후 다시 시도해 주세요. (인터넷 연결 및 API 상태 확인 필요)");
                        }
                    }
                };

                fetchWithRetry(1000);
            };

            return (
                <div className="min-h-screen pb-20">
                    <nav className="glass-nav sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <div className="bg-indigo-600 p-2 rounded-xl text-white shadow-md">
                                <Icon name="sparkle" size={24} />
                            </div>
                            <h1 className="font-black text-xl tracking-tight">ENG <span className="text-indigo-600">TREE</span></h1>
                        </div>
                        
                        <div className="flex bg-slate-100 p-1 rounded-xl">
                            <button onClick={() => setMode('card')} className={`px-4 py-2 rounded-lg text-sm font-bold transition-all ${mode === 'card' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>카드</button>
                            <button onClick={() => setMode('list')} className={`px-4 py-2 rounded-lg text-sm font-bold transition-all ${mode === 'list' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>목록</button>
                        </div>
                    </nav>

                    <main className="max-w-4xl mx-auto px-6 pt-10">
                        {isAdmin && (
                            <div className="mb-10 flex justify-center">
                                <button 
                                    onClick={() => setIsModalOpen(true)}
                                    className="flex items-center gap-3 px-8 py-5 bg-slate-900 text-white rounded-3xl font-bold shadow-xl hover:bg-indigo-600 transition-all active:scale-95"
                                >
                                    <Icon name="plus" size={24} />
                                    지문 자동 분석 (수형도 생성)
                                </button>
                            </div>
                        )}

                        {sentences.length > 0 ? (
                            <div className="animate-slide">
                                {mode === 'card' && (
                                    <div className="flex flex-col items-center">
                                        <div 
                                            className={`w-full min-h-[520px] bg-white rounded-[3rem] card-shadow flex flex-col items-center justify-center p-8 text-center transition-all duration-500 border-2 ${isFlipped ? 'border-indigo-500 ring-8 ring-indigo-50' : 'border-slate-100 hover:border-indigo-200'}`}
                                        >
                                            {!isFlipped ? (
                                                <div className="space-y-8 w-full cursor-pointer" onClick={() => setIsFlipped(true)}>
                                                    <span className="text-xs font-black text-indigo-400 uppercase tracking-widest bg-indigo-50 px-3 py-1 rounded-full">Target Sentence</span>
                                                    <h2 className="text-3xl md:text-5xl font-black text-slate-800 leading-[1.4] break-keep px-4">
                                                        {sentences[currentIndex].english.split(' / ').map((c, i, a) => (
                                                            <span key={i} className="inline-block">{c}{i < a.length - 1 && <span className="chunk-slash">/</span>}</span>
                                                        ))}
                                                    </h2>
                                                    <p className="text-slate-400 font-medium">카드를 클릭하면 분석 내용이 나타납니다.</p>
                                                </div>
                                            ) : (
                                                <div className="space-y-6 w-full h-full flex flex-col">
                                                    <div className="flex justify-between items-center mb-4">
                                                        <span className="text-xs font-black text-emerald-500 uppercase tracking-widest">Analysis View</span>
                                                        <button 
                                                            onClick={(e) => {e.stopPropagation(); setShowTree(!showTree);}}
                                                            className={`flex items-center gap-2 px-4 py-2 rounded-xl font-bold text-sm transition-all shadow-sm ${showTree ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-600'}`}
                                                        >
                                                            <Icon name="tree" size={18} /> {showTree ? "설명 보기" : "수형도 보기"}
                                                        </button>
                                                    </div>
                                                    
                                                    {showTree ? (
                                                        <div className="flex-1 flex flex-col gap-4 animate-slide overflow-hidden">
                                                            <h3 className="text-lg font-bold text-slate-700">Syntactic Structure (수형도)</h3>
                                                            <TreeDiagram data={sentences[currentIndex].treeData} />
                                                        </div>
                                                    ) : (
                                                        <div className="flex-1 flex flex-col justify-center space-y-6" onClick={() => setIsFlipped(false)}>
                                                            <h2 className="text-2xl md:text-3xl font-bold text-slate-700 leading-relaxed break-keep px-6">{sentences[currentIndex].korean}</h2>
                                                            <div className="bg-slate-50 p-6 rounded-2xl border border-slate-100 inline-block mx-auto max-w-[90%]">
                                                                <p className="text-indigo-600 font-bold text-lg flex items-center justify-center gap-3">
                                                                    <Icon name="brain" size={24} /> {sentences[currentIndex].grammar}
                                                                </p>
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            )}
                                        </div>

                                        <div className="flex items-center gap-10 mt-12">
                                            <button onClick={() => {setIsFlipped(false); setShowTree(false); setCurrentIndex(c => Math.max(0, c-1))}} disabled={currentIndex === 0} className="p-5 bg-white rounded-full shadow-lg text-slate-400 hover:text-indigo-600 disabled:opacity-30 transition-all active:scale-90"><Icon name="left" size={32}/></button>
                                            <div className="font-bold text-slate-400 text-lg tracking-widest">{currentIndex + 1} / {sentences.length}</div>
                                            <button onClick={() => {setIsFlipped(false); setShowTree(false); setCurrentIndex(c => Math.min(sentences.length-1, c+1))}} disabled={currentIndex === sentences.length - 1} className="p-5 bg-white rounded-full shadow-lg text-slate-400 hover:text-indigo-600 disabled:opacity-30 transition-all active:scale-90"><Icon name="right" size={32}/></button>
                                        </div>
                                    </div>
                                )}

                                {mode === 'list' && (
                                    <div className="space-y-6">
                                        {sentences.map((s, idx) => (
                                            <div key={s.id} className="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm flex flex-col md:flex-row gap-6 hover:border-indigo-200 transition-all">
                                                <div className="bg-slate-100 text-slate-500 w-12 h-12 rounded-2xl flex items-center justify-center font-black text-xl shrink-0">{idx + 1}</div>
                                                <div className="flex-1">
                                                    <h3 className="text-xl font-bold text-slate-800 mb-2 leading-relaxed">{s.english}</h3>
                                                    <p className="text-slate-500 font-medium mb-4">{s.korean}</p>
                                                    <div className="flex flex-wrap gap-2">
                                                        <div className="inline-flex items-center gap-2 bg-indigo-50 px-4 py-2 rounded-xl text-sm font-bold text-indigo-600 border border-indigo-100">
                                                            <Icon name="brain" size={16} /> {s.grammar}
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div className="text-center py-32 border-4 border-dashed border-slate-100 rounded-[3rem] text-slate-300 font-bold flex flex-col items-center gap-4">
                                <Icon name="brain" size={64} className="opacity-20" />
                                <span>분석된 문장이 없습니다. 상단 '지문 자동 분석'을 통해 문장을 추가해 보세요.</span>
                            </div>
                        )}
                    </main>

                    {/* Modals */}
                    {isLoginModalOpen && (
                        <div className="fixed inset-0 z-[110] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-sm">
                            <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-sm border border-slate-100">
                                <div className="bg-indigo-50 w-16 h-16 rounded-2xl flex items-center justify-center text-indigo-600 mx-auto mb-6">
                                    <Icon name="lock" size={32} />
                                </div>
                                <h3 className="text-2xl font-black mb-2 text-center">관리자 인증</h3>
                                <p className="text-slate-400 text-center mb-8 font-medium">교사 전용 기능을 사용하기 위해<br/>비밀번호를 입력하세요.</p>
                                <input type="password" value={pwInput} onChange={(e) => setPwInput(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && handleLogin()} className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl text-center font-bold outline-none mb-6 focus:border-indigo-500 transition-all" placeholder="Password" autoFocus />
                                <button onClick={handleLogin} className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-200 hover:bg-indigo-700 active:scale-95 transition-all">인증하기</button>
                                <button onClick={() => setIsLoginModalOpen(false)} className="w-full py-3 text-slate-400 font-bold text-sm mt-2">취소</button>
                            </div>
                        </div>
                    )}

                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/80 backdrop-blur-md">
                            <div className="bg-white w-full max-w-3xl rounded-[3rem] overflow-hidden shadow-2xl animate-slide">
                                <div className="px-10 py-8 bg-indigo-600 text-white flex justify-between items-center">
                                    <div className="flex items-center gap-4">
                                        <div className="bg-white/20 p-2 rounded-xl">
                                            <Icon name="sparkle" size={24} />
                                        </div>
                                        <div>
                                            <h3 className="font-black text-xl tracking-tight">지문 자동 분석 엔진</h3>
                                            <p className="text-indigo-100 text-xs font-bold opacity-80 uppercase tracking-widest mt-0.5">Generative Grammar Analysis</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setIsModalOpen(false)} className="hover:rotate-90 transition-all p-2 bg-white/10 rounded-full"><Icon name="x" size={24}/></button>
                                </div>
                                <div className="p-10">
                                    <div className="mb-4 flex justify-between items-end">
                                        <label className="text-sm font-black text-slate-400 uppercase tracking-widest ml-2">Text Input</label>
                                        <span className="text-xs font-bold text-slate-300">{inputText.length} characters</span>
                                    </div>
                                    <textarea value={inputText} onChange={(e) => setInputText(e.target.value)} className="w-full h-72 p-8 bg-slate-50 rounded-[2rem] border-2 border-slate-100 outline-none mb-8 font-medium focus:border-indigo-500 focus:bg-white transition-all resize-none text-xl leading-relaxed" placeholder="교과서 지문이나 영어 문장을 입력하세요..."></textarea>
                                    <div className="flex gap-4">
                                        <button onClick={() => setIsModalOpen(false)} className="flex-1 py-5 bg-slate-100 text-slate-500 rounded-2xl font-bold hover:bg-slate-200 transition-all">닫기</button>
                                        <button onClick={runAnalysis} disabled={isAnalyzing || !inputText.trim()} className="flex-[2] py-5 bg-indigo-600 text-white rounded-2xl font-bold flex items-center justify-center gap-3 shadow-xl shadow-indigo-100 hover:bg-indigo-700 disabled:opacity-50 disabled:shadow-none transition-all active:scale-95">
                                            {isAnalyzing ? (
                                                <>
                                                    <div className="animate-spin rounded-full h-5 w-5 border-2 border-white border-t-transparent"></div>
                                                    생성문법 엔진 가동 중...
                                                </>
                                            ) : <><Icon name="sparkle" size={20}/> 수형도 분석 실행</>}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="fixed bottom-6 right-6 flex flex-col gap-3 items-end">
                        <button onClick={() => isAdmin ? setIsAdmin(false) : setIsLoginModalOpen(true)} className={`flex items-center gap-3 px-8 py-5 rounded-full shadow-2xl font-bold text-sm transition-all active:scale-95 ${isAdmin ? 'bg-emerald-500 text-white' : 'bg-slate-900 text-white hover:bg-slate-800'}`}>
                            <Icon name={isAdmin ? "unlock" : "lock"} size={18} />
                            {isAdmin ? "교사 인증 해제" : "교사 로그인"}
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
