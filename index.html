<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Syntax Master | Teacher Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-bottom: 2px solid #e2e8f0; }
        .card-shadow { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); }
        .chunk-slash { color: #6366f1; font-weight: 300; margin: 0 0.4rem; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                brain: <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .52 5.588 4 4 0 0 0 7.837.231S12 16 12 15Zm0 0a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.52 5.588 4 4 0 0 1-7.837.231S12 16 12 15Z"/>,
                sparkle: <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>,
                copy: <><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></>,
                plus: <path d="M5 12h14m-7-7v14"/>,
                x: <path d="M18 6 6 18M6 6l12 12"/>,
                left: <path d="m15 18-6-6 6-6"/>,
                right: <path d="m9 18 6-6 6-6"/>,
                lock: <><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>,
                unlock: <><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const apiKey = ""; 
            const adminPassword = "4321"; // 선생님께서 원하시는 비밀번호로 수정 가능

            const [sentences, setSentences] = useState([
                { id: 1, english: "There is no age / at which it is too late / to form this habit.", korean: "이 습관을 형성하기에 너무 늦은 나이란 없습니다.", grammar: "at which: 전치사 + 관계대명사 (형용사절 이동)", isMemorized: false }
            ]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);
            const [mode, setMode] = useState('card');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [inputText, setInputText] = useState("");
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [fontSize, setFontSize] = useState(1.1);
            
            // 관리자 권한 상태
            const [isAdmin, setIsAdmin] = useState(false);
            const [isLoginModalOpen, setIsLoginModalOpen] = useState(false);
            const [pwInput, setPwInput] = useState("");

            const copyCode = () => {
                const code = document.documentElement.outerHTML;
                const el = document.createElement('textarea');
                el.value = code;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                alert("💻 앱 소스 코드가 복사되었습니다!");
            };

            const handleLogin = () => {
                if(pwInput === adminPassword) {
                    setIsAdmin(true);
                    setIsLoginModalOpen(false);
                    setPwInput("");
                } else {
                    alert("비밀번호가 틀렸습니다.");
                }
            };

            const runAnalysis = async () => {
                if (!inputText.trim()) return;
                setIsAnalyzing(true);
                const prompt = `Analyze: "${inputText}". Break into sentences. For each: 1. '/' for chunks 2. Korean translation 3. Chomsky Generative Grammar insight. JSON: [{english, korean, grammar}]`;

                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    const result = await res.json();
                    const data = JSON.parse(result.candidates[0].content.parts[0].text);
                    const newItems = data.map(item => ({ ...item, id: Date.now() + Math.random(), isMemorized: false }));
                    setSentences([...sentences, ...newItems]);
                    setIsModalOpen(false);
                    setInputText("");
                } catch (e) {
                    alert("분석 실패.");
                } finally {
                    setIsAnalyzing(false);
                }
            };

            return (
                <div className="min-h-screen pb-20 select-none" style={{ fontSize: `${fontSize}rem` }}>
                    <nav className="glass-nav sticky top-0 z-50 px-8 py-5 flex justify-between items-center">
                        <div className="flex items-center gap-4">
                            <div className="bg-indigo-600 p-2.5 rounded-2xl text-white shadow-lg">
                                <Icon name="sparkle" size={28} />
                            </div>
                            <h1 className="font-[900] text-2xl tracking-tighter">CLASSROOM <span className="text-indigo-600">ENGLISH</span></h1>
                        </div>
                        
                        <div className="flex items-center gap-3">
                            <button onClick={() => setMode('card')} className={`px-6 py-2.5 rounded-xl font-bold transition-all ${mode === 'card' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-500'}`}>Card View</button>
                            <button onClick={() => setMode('list')} className={`px-6 py-2.5 rounded-xl font-bold transition-all ${mode === 'list' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-500'}`}>List View</button>
                        </div>

                        <div className="hidden md:flex gap-2">
                            <button onClick={() => setFontSize(f => Math.min(f + 0.1, 1.8))} className="w-10 h-10 bg-white border border-slate-200 rounded-lg font-black text-slate-700">A+</button>
                            <button onClick={() => setFontSize(f => Math.max(f - 0.1, 0.8))} className="w-10 h-10 bg-white border border-slate-200 rounded-lg font-black text-slate-700">A-</button>
                        </div>
                    </nav>

                    <main className="max-w-6xl mx-auto px-6 pt-12">
                        {/* 관리자에게만 보이는 수업 시작 버튼 */}
                        {isAdmin && (
                            <div className="mb-14 flex justify-center animate-fade">
                                <button 
                                    onClick={() => setIsModalOpen(true)}
                                    className="group flex items-center gap-4 px-12 py-7 bg-slate-900 text-white rounded-[2.5rem] font-black text-xl shadow-2xl hover:bg-indigo-600 transition-all active:scale-95"
                                >
                                    <Icon name="plus" size={30} className="group-hover:rotate-90 transition-transform" />
                                    새 단락 분석 수업 시작
                                </button>
                            </div>
                        )}

                        {sentences.length > 0 ? (
                            <div className="animate-fade">
                                {mode === 'card' && (
                                    <div className="flex flex-col items-center">
                                        <div 
                                            onClick={() => setIsFlipped(!isFlipped)}
                                            className={`w-full min-h-[500px] bg-white rounded-[5rem] card-shadow cursor-pointer flex flex-col items-center justify-center p-16 text-center transition-all duration-500 border-[4px] ${isFlipped ? 'border-indigo-500 bg-indigo-50/10' : 'border-white hover:border-indigo-200'}`}
                                        >
                                            {!isFlipped ? (
                                                <div className="space-y-12">
                                                    <div className="inline-block px-6 py-2 bg-indigo-100 text-indigo-700 rounded-full text-sm font-black tracking-widest uppercase">Target Sentence</div>
                                                    <h2 className="text-4xl md:text-7xl font-[900] text-slate-800 leading-[1.3] break-keep">
                                                        {sentences[currentIndex].english.split(' / ').map((c, i, a) => (
                                                            <span key={i}>{c}{i < a.length - 1 && <span className="chunk-slash">/</span>}</span>
                                                        ))}
                                                    </h2>
                                                    <p className="text-slate-300 font-bold uppercase tracking-[0.6em] text-sm animate-pulse mt-8">Click to reveal translation</p>
                                                </div>
                                            ) : (
                                                <div className="space-y-10">
                                                    <div className="inline-block px-6 py-2 bg-emerald-100 text-emerald-700 rounded-full text-sm font-black tracking-widest uppercase">Analysis Result</div>
                                                    <h2 className="text-3xl md:text-5xl font-extrabold text-slate-700 leading-tight break-keep">{sentences[currentIndex].korean}</h2>
                                                    <div className="bg-slate-900 p-10 rounded-[3rem] border-t-8 border-indigo-500 shadow-2xl max-w-3xl mx-auto mt-10">
                                                        <p className="text-indigo-400 font-black italic text-2xl flex items-center justify-center gap-4 leading-relaxed">
                                                            <Icon name="brain" size={32} /> {sentences[currentIndex].grammar}
                                                        </p>
                                                    </div>
                                                </div>
                                            )}
                                        </div>

                                        <div className="flex items-center gap-16 mt-16 pb-10">
                                            <button onClick={() => {setIsFlipped(false); setCurrentIndex(c => Math.max(0, c-1))}} disabled={currentIndex === 0} className="p-8 bg-white rounded-full shadow-xl text-slate-400 hover:text-indigo-600 disabled:opacity-20 transition-all active:scale-90"><Icon name="left" size={40}/></button>
                                            <div className="text-center font-black text-slate-300 tracking-[0.5em] text-sm">{currentIndex + 1} / {sentences.length}</div>
                                            <button onClick={() => {setIsFlipped(false); setCurrentIndex(c => Math.min(sentences.length-1, c+1))}} disabled={currentIndex === sentences.length - 1} className="p-8 bg-white rounded-full shadow-xl text-slate-400 hover:text-indigo-600 disabled:opacity-20 transition-all active:scale-90"><Icon name="right" size={40}/></button>
                                        </div>
                                    </div>
                                )}

                                {mode === 'list' && (
                                    <div className="grid gap-8 pb-20">
                                        {sentences.map((s, idx) => (
                                            <div key={s.id} className="bg-white p-12 rounded-[4rem] border-2 border-slate-100 shadow-sm flex gap-10 items-start">
                                                <div className="bg-slate-900 text-white w-14 h-14 rounded-2xl flex items-center justify-center font-black shrink-0 text-xl">{idx + 1}</div>
                                                <div className="flex-1">
                                                    <h3 className="text-3xl font-[900] text-slate-800 mb-6 leading-snug">{s.english}</h3>
                                                    <p className="text-slate-500 font-bold text-xl mb-10 border-l-8 border-slate-100 pl-6">{s.korean}</p>
                                                    <div className="inline-flex items-center gap-3 bg-indigo-50 px-6 py-3 rounded-2xl text-sm font-black text-indigo-600 uppercase tracking-widest border border-indigo-100">
                                                        <Icon name="brain" size={18} /> {s.grammar}
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div className="text-center py-40 bg-white rounded-[5rem] border-4 border-dashed border-slate-100 text-slate-200 font-black tracking-widest uppercase italic text-2xl">Awaiting Lesson Data...</div>
                        )}
                    </main>

                    {/* 교사 인증 모달 */}
                    {isLoginModalOpen && (
                        <div className="fixed inset-0 z-[110] flex items-center justify-center p-8 bg-slate-900/60 backdrop-blur-md">
                            <div className="bg-white p-12 rounded-[3.5rem] shadow-2xl w-full max-w-md animate-fade">
                                <h3 className="text-2xl font-black text-slate-800 mb-6 text-center">교사 인증</h3>
                                <input 
                                    type="password"
                                    value={pwInput}
                                    onChange={(e) => setPwInput(e.target.value)}
                                    onKeyPress={(e) => e.key === 'Enter' && handleLogin()}
                                    className="w-full p-6 bg-slate-100 border-2 border-slate-200 rounded-2xl text-xl font-bold focus:bg-white focus:border-indigo-500 outline-none mb-6 text-center"
                                    placeholder="Password"
                                    autoFocus
                                />
                                <div className="flex gap-3">
                                    <button onClick={() => setIsLoginModalOpen(false)} className="flex-1 py-4 bg-slate-200 text-slate-600 rounded-2xl font-bold">취소</button>
                                    <button onClick={handleLogin} className="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg shadow-indigo-100">확인</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* AI 분석 모달 (Admin 전용) */}
                    {isModalOpen && isAdmin && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-8 bg-slate-900/90 backdrop-blur-xl">
                            <div className="bg-white w-full max-w-5xl max-h-[90vh] rounded-[4.5rem] shadow-2xl flex flex-col overflow-hidden animate-fade">
                                <div className="px-14 py-10 bg-indigo-600 text-white flex justify-between items-center">
                                    <h3 className="text-4xl font-[900] tracking-tighter uppercase">Paragraph Analysis</h3>
                                    <button onClick={() => setIsModalOpen(false)} className="bg-white/20 p-4 rounded-3xl"><Icon name="x" size={32}/></button>
                                </div>
                                <div className="p-14 overflow-y-auto flex-1 custom-scrollbar">
                                    <textarea 
                                        value={inputText}
                                        onChange={(e) => setInputText(e.target.value)}
                                        className="w-full h-72 p-12 bg-slate-50 border-4 border-slate-100 rounded-[3.5rem] text-2xl font-bold focus:bg-white focus:border-indigo-500 outline-none transition-all mb-12"
                                        placeholder="영문 지문을 입력하세요..."
                                    />
                                    <button onClick={runAnalysis} disabled={isAnalyzing} className="w-full py-10 bg-indigo-600 text-white rounded-[3rem] font-black text-2xl shadow-2xl hover:bg-indigo-700 flex items-center justify-center gap-6">
                                        {isAnalyzing ? <div className="w-10 h-10 border-6 border-white border-t-transparent rounded-full animate-spin"></div> : <Icon name="sparkle" size={36}/>}
                                        수업용 카드 세트 생성
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 플로팅 컨트롤 */}
                    <div className="fixed bottom-8 right-8 flex flex-col gap-4 items-end z-40">
                        {/* 관리자 전환 버튼 */}
                        <button 
                            onClick={() => isAdmin ? setIsAdmin(false) : setIsLoginModalOpen(true)}
                            className={`flex items-center gap-4 px-6 py-4 rounded-full shadow-2xl transition-all active:scale-95 border-2 ${isAdmin ? 'bg-emerald-500 text-white border-emerald-400' : 'bg-slate-900 text-white border-slate-700'}`}
                        >
                            <Icon name={isAdmin ? "unlock" : "lock"} size={24} />
                            <span className="font-black text-sm tracking-tighter">{isAdmin ? "ADMIN ACTIVE" : "TEACHER LOGIN"}</span>
                        </button>

                        {/* 소스 복사 버튼 (Admin 전용 노출 권장하나 편의상 유지) */}
                        {isAdmin && (
                            <button onClick={copyCode} className="flex items-center gap-4 px-6 py-4 bg-white text-slate-900 border-2 border-slate-200 rounded-full shadow-lg hover:bg-slate-50 transition-all font-black text-sm pr-8">
                                <Icon name="copy" size={24} className="text-indigo-600" />
                                SOURCE COPY
                            </button>
                        )}
                        
                        <div className="bg-white/80 backdrop-blur-md px-6 py-3 rounded-2xl border-2 border-slate-100 shadow-sm">
                            <p className="text-[10px] font-black text-slate-400 tracking-widest uppercase">Admin Protected Mode v2.1</p>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
