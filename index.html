<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Syntax Master | Multi-Sentence Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #1e293b; overflow-x: hidden; }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid #e2e8f0; }
        .card-shadow { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
        .chunk-slash { color: #6366f1; font-weight: 300; margin: 0 0.5rem; }
        
        /* Tree Diagram Styles */
        .tree-node { font-size: 13px; font-weight: 700; fill: #475569; }
        .tree-leaf { font-size: 15px; font-weight: 800; fill: #6366f1; }
        .tree-line { stroke: #cbd5e1; stroke-width: 1.5; fill: none; }
        .tree-container { overflow-x: auto; scrollbar-width: thin; }

        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .analyzing-pulse { animation: pulse-soft 2s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                brain: <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .52 5.588 4 4 0 0 0 7.837.231S12 16 12 15Zm0 0a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.52 5.588 4 4 0 0 1-7.837.231S12 16 12 15Z"/>,
                sparkle: <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>,
                tree: <path d="M12 2L8 6h3v8H4l8 8 8-8h-7V6h3l-4-4z"/>,
                plus: <path d="M5 12h14m-7-7v14"/>,
                x: <path d="M18 6 6 18M6 6l12 12"/>,
                left: <path d="m15 18-6-6 6-6"/>,
                right: <path d="m9 18 6-6 6-6"/>,
                check: <path d="M20 6 9 17l-5-5"/>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const TreeDiagram = ({ data }) => {
            if (!data) return null;
            const nodeWidth = 70;
            const nodeHeight = 60;
            const padding = 40;

            const calculatePositions = (node, depth = 0, xOffset = 0) => {
                let totalWidth = 0;
                if (node.children && node.children.length > 0) {
                    node.children.forEach(child => {
                        const childPos = calculatePositions(child, depth + 1, xOffset + totalWidth);
                        totalWidth += childPos.subtreeWidth;
                    });
                } else {
                    totalWidth = nodeWidth;
                }
                node.x = xOffset + totalWidth / 2;
                node.y = depth * nodeHeight + padding;
                node.subtreeWidth = totalWidth;
                return node;
            };

            try {
                const rootWithPos = calculatePositions(JSON.parse(JSON.stringify(data)));
                const renderLinks = (node) => (node.children?.map((child, i) => (
                    <React.Fragment key={i}>
                        <line className="tree-line" x1={node.x} y1={node.y} x2={child.x} y2={child.y} />
                        {renderLinks(child)}
                    </React.Fragment>
                )));
                const renderNodes = (node) => (
                    <React.Fragment key={`${node.name}-${node.x}`}>
                        <text x={node.x} y={node.y} textAnchor="middle" className={node.children ? "tree-node" : "tree-leaf"}>{node.name}</text>
                        {node.children?.map(child => renderNodes(child))}
                    </React.Fragment>
                );
                return (
                    <div className="tree-container bg-white rounded-2xl p-4 overflow-x-auto border border-slate-100 shadow-inner">
                        <svg width={Math.max(600, rootWithPos.subtreeWidth + padding * 2)} height={400}>
                            {renderLinks(rootWithPos)}
                            {renderNodes(rootWithPos)}
                        </svg>
                    </div>
                );
            } catch (e) { return <p className="text-red-400 text-sm">Tree Data Error</p>; }
        };

        const App = () => {
            const apiKey = ""; // Canvas 환경에서 자동 주입됨
            const [sentences, setSentences] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);
            const [showTree, setShowTree] = useState(false);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [inputText, setInputText] = useState("");
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [progress, setProgress] = useState({ current: 0, total: 0 });

            const splitSentences = (text) => {
                // 문장 종결 어미(. ? !) 뒤에 공백이 오는 경우를 기준으로 분리
                return text.split(/(?<=[.?!])\s+/).filter(s => s.trim().length > 5);
            };

            const analyzeSingleSentence = async (sentence, index, total) => {
                setProgress({ current: index + 1, total });
                
                const prompt = `Analyze this English sentence for Korean students: "${sentence}"
                Return ONLY a JSON object with:
                1. "english": string with '/' chunk divisions.
                2. "korean": natural translation.
                3. "grammar": one key syntax rule.
                4. "treeData": hierarchical syntax tree object (name, children).`;

                let retries = 0;
                while (retries < 3) {
                    try {
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }] }],
                                generationConfig: { responseMimeType: "application/json" }
                            })
                        });
                        const result = await res.json();
                        return JSON.parse(result.candidates[0].content.parts[0].text);
                    } catch (e) {
                        retries++;
                        await new Promise(r => setTimeout(r, 1000 * retries));
                    }
                }
                return null;
            };

            const runFullAnalysis = async () => {
                if (!inputText.trim()) return;
                setIsAnalyzing(true);
                const rawSentences = splitSentences(inputText);
                const results = [];

                for (let i = 0; i < rawSentences.length; i++) {
                    const data = await analyzeSingleSentence(rawSentences[i], i, rawSentences.length);
                    if (data) results.push({ ...data, id: Date.now() + i });
                }

                if (results.length > 0) {
                    setSentences(results);
                    setCurrentIndex(0);
                    setIsModalOpen(false);
                    setInputText("");
                } else {
                    alert("문장 분석에 실패했습니다. 지문 길이를 조절해 보세요.");
                }
                setIsAnalyzing(false);
            };

            return (
                <div className="min-h-screen pb-20">
                    <nav className="glass-nav sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <div className="bg-indigo-600 p-2 rounded-xl text-white shadow-md">
                                <Icon name="sparkle" size={24} />
                            </div>
                            <h1 className="font-black text-xl tracking-tight uppercase">Syntax Master</h1>
                        </div>
                        <button onClick={() => setIsModalOpen(true)} className="px-5 py-2.5 bg-slate-900 text-white rounded-xl font-bold text-sm hover:bg-indigo-600 transition-all">지문 새로 고침</button>
                    </nav>

                    <main className="max-w-4xl mx-auto px-6 pt-12">
                        {sentences.length > 0 ? (
                            <div className="flex flex-col items-center">
                                <div className={`w-full min-h-[500px] bg-white rounded-[2.5rem] card-shadow flex flex-col p-10 transition-all duration-500 border-2 ${isFlipped ? 'border-indigo-500 ring-8 ring-indigo-50' : 'border-slate-50'}`}>
                                    <div className="flex justify-between items-center mb-8">
                                        <span className="text-[10px] font-black tracking-[0.2em] text-slate-300 uppercase">Sentence {currentIndex + 1} of {sentences.length}</span>
                                        {isFlipped && (
                                            <button 
                                                onClick={() => setShowTree(!showTree)}
                                                className={`flex items-center gap-2 px-4 py-1.5 rounded-full text-xs font-black transition-all ${showTree ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-600'}`}
                                            >
                                                <Icon name="tree" size={14} /> {showTree ? "설명 보기" : "수형도 보기"}
                                            </button>
                                        )}
                                    </div>

                                    <div className="flex-1 flex flex-col justify-center text-center cursor-pointer" onClick={() => setIsFlipped(!isFlipped)}>
                                        {!isFlipped ? (
                                            <h2 className="text-3xl md:text-4xl font-black text-slate-800 leading-snug break-keep">
                                                {sentences[currentIndex].english.split(' / ').map((c, i, a) => (
                                                    <span key={i}>{c}{i < a.length - 1 && <span className="chunk-slash">/</span>}</span>
                                                ))}
                                            </h2>
                                        ) : (
                                            <div className="animate-in fade-in slide-in-from-bottom-4 duration-500 h-full flex flex-col">
                                                {showTree ? (
                                                    <TreeDiagram data={sentences[currentIndex].treeData} />
                                                ) : (
                                                    <div className="space-y-8 my-auto">
                                                        <p className="text-2xl font-bold text-slate-700 leading-relaxed">{sentences[currentIndex].korean}</p>
                                                        <div className="bg-indigo-50/50 p-5 rounded-2xl inline-block border border-indigo-100">
                                                            <p className="text-indigo-600 font-bold text-sm flex items-center gap-2">
                                                                <Icon name="brain" size={18} /> {sentences[currentIndex].grammar}
                                                            </p>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                </div>

                                <div className="flex items-center gap-12 mt-10">
                                    <button onClick={() => {setIsFlipped(false); setShowTree(false); setCurrentIndex(c => Math.max(0, c-1))}} disabled={currentIndex === 0} className="p-4 bg-white rounded-full shadow-md text-slate-300 hover:text-indigo-600 disabled:opacity-20 transition-all"><Icon name="left" size={28}/></button>
                                    <button onClick={() => {setIsFlipped(false); setShowTree(false); setCurrentIndex(c => Math.min(sentences.length-1, c+1))}} disabled={currentIndex === sentences.length - 1} className="p-4 bg-white rounded-full shadow-md text-slate-300 hover:text-indigo-600 disabled:opacity-20 transition-all"><Icon name="right" size={28}/></button>
                                </div>
                            </div>
                        ) : (
                            <div className="text-center py-40 bg-white rounded-[3rem] border-2 border-dashed border-slate-200 flex flex-col items-center justify-center gap-6">
                                <div className="p-6 bg-slate-50 rounded-full text-slate-300"><Icon name="brain" size={48} /></div>
                                <p className="text-slate-400 font-bold">지문을 입력하고 [수형도 분석] 버튼을 눌러주세요.</p>
                                <button onClick={() => setIsModalOpen(true)} className="px-8 py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg hover:shadow-indigo-200 transition-all active:scale-95">지문 입력하기</button>
                            </div>
                        )}
                    </main>

                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-2xl rounded-[2.5rem] shadow-2xl overflow-hidden">
                                <div className="p-8 bg-slate-900 text-white flex justify-between items-center">
                                    <h3 className="text-xl font-black flex items-center gap-3"><Icon name="sparkle" size={24} className="text-indigo-400"/> 지문 입력 (문장 단위 자동 분석)</h3>
                                    <button onClick={() => !isAnalyzing && setIsModalOpen(false)} className="opacity-50 hover:opacity-100"><Icon name="x" size={24}/></button>
                                </div>
                                <div className="p-8">
                                    <textarea 
                                        value={inputText} 
                                        onChange={(e) => setInputText(e.target.value)} 
                                        className="w-full h-64 p-6 bg-slate-50 rounded-2xl border-2 border-slate-100 outline-none focus:border-indigo-500 transition-all text-lg leading-relaxed mb-6 resize-none"
                                        placeholder="박준희 영어1 1과 본문 등 긴 단락을 붙여넣으세요. AI가 자동으로 문장별로 나누어 수형도를 생성합니다."
                                    ></textarea>
                                    
                                    {isAnalyzing ? (
                                        <div className="space-y-4">
                                            <div className="w-full bg-slate-100 h-3 rounded-full overflow-hidden">
                                                <div className="bg-indigo-600 h-full transition-all duration-300" style={{width: `${(progress.current / progress.total) * 100}%`}}></div>
                                            </div>
                                            <p className="text-center font-black text-indigo-600 analyzing-pulse">
                                                전체 {progress.total}문장 중 {progress.current}번째 문장 분석 중...
                                            </p>
                                        </div>
                                    ) : (
                                        <div className="flex gap-3">
                                            <button onClick={() => setIsModalOpen(false)} className="flex-1 py-4 bg-slate-100 text-slate-500 rounded-xl font-bold">취소</button>
                                            <button onClick={runFullAnalysis} disabled={!inputText.trim()} className="flex-[2] py-4 bg-indigo-600 text-white rounded-xl font-black shadow-xl shadow-indigo-100 disabled:opacity-50 transition-all active:scale-95">수형도 분석 실행</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
